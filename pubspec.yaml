name: chefvision_app
description: "ChefVision AI - Akıllı yemek tarifi ve malzeme tanıma uygulaması"
publish_to: 'none'
version: 2.0.10+14

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Design
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  lottie: ^3.0.0
  fl_chart: ^0.66.0
  
  # State Management
  provider: ^6.1.1
  
  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.0
  in_app_purchase: ^3.1.13
  http_parser: ^4.0.2
  
  # Camera & Image
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  image: ^4.1.4
  
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # Utils
  intl: ^0.20.2
  permission_handler: ^11.3.1
  path_provider: ^2.1.2
  device_preview: ^1.1.0
  device_info_plus: ^10.1.0
  
  # Security (Advanced)
  # Packages are added at the bottom by 'flutter pub add'
  
  # Voice Assistant
  speech_to_text: ^7.0.0
  flutter_tts: ^3.8.5
  audio_waveforms: ^1.0.5
  wakelock_plus: ^1.2.0
  audioplayers: ^6.0.0

  flutter_localizations:
    sdk: flutter
  flutter_jailbreak_detection: ^1.10.0
  http_certificate_pinning: ^3.0.1
  url_launcher: ^6.3.1
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.1
  crisp: ^0.3.1
  cloud_firestore: ^5.4.0
  timeago: ^3.7.1
  firebase_core: ^3.4.0
  firebase_crashlytics: ^4.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1
  

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon.png"
  min_sdk_android: 21

dependency_overrides:
  http: ^1.2.0
  flutter_inappwebview: ^6.1.5
flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/ 

